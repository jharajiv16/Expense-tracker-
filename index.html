<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Personal ledger</p>
        <h1>Expense Tracker</h1>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" id="themeToggle" type="button" aria-pressed="false">
          <span class="toggle-track" aria-hidden="true"><span class="toggle-dot"></span></span>
          <span id="themeToggleText">Dark mode</span>
        </button>
        <button class="danger-button" id="clearAllBtn" type="button">Clear all</button>
      </div>
    </header>

    <section class="summary-grid" aria-label="Account summary">
      <article class="summary-tile balance">
        <span>Balance</span>
        <strong id="balanceTotal">Rs 0.00</strong>
      </article>
      <article class="summary-tile income">
        <span>Income</span>
        <strong id="incomeTotal">Rs 0.00</strong>
      </article>
      <article class="summary-tile expense">
        <span>Expenses</span>
        <strong id="expenseTotal">Rs 0.00</strong>
      </article>
    </section>

    <section class="workspace">
      <form class="transaction-form" id="transactionForm">
        <div class="form-heading">
          <h2 id="formTitle">Add transaction</h2>
          <button class="text-button ghost hidden" id="cancelEditBtn" type="button">Cancel edit</button>
        </div>

        <input type="hidden" id="transactionId">

        <label for="description">Description</label>
        <input id="description" name="description" type="text" placeholder="Salary, groceries, rent" maxlength="80" required>

        <div class="form-row">
          <div>
            <label for="amount">Amount</label>
            <input id="amount" name="amount" type="number" placeholder="0.00" min="0.01" step="0.01" required>
          </div>
          <div>
            <label for="date">Date</label>
            <input id="date" name="date" type="date" required>
          </div>
        </div>

        <label for="category">Category</label>
        <input id="category" name="category" type="text" placeholder="Food, travel, bills" maxlength="40" required>

        <fieldset class="type-toggle">
          <legend>Type</legend>
          <label>
            <input type="radio" name="type" value="income" checked>
            <span>Income</span>
          </label>
          <label>
            <input type="radio" name="type" value="expense">
            <span>Expense</span>
          </label>
        </fieldset>

        <button class="primary-button" id="submitBtn" type="submit">Add transaction</button>
      </form>

      <section class="transactions-panel" aria-labelledby="transactionsHeading">
        <div class="panel-header">
          <div>
            <h2 id="transactionsHeading">Transactions</h2>
            <p id="transactionCount">0 records</p>
          </div>
          <div class="filters" aria-label="Transaction filters">
            <select id="typeFilter" aria-label="Filter by transaction type">
              <option value="all">All</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <input id="searchInput" type="search" placeholder="Search records" aria-label="Search transactions">
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th scope="col">Details</th>
                <th scope="col">Category</th>
                <th scope="col">Date</th>
                <th scope="col">Amount</th>
                <th scope="col">Actions</th>
              </tr>
            </thead>
            <tbody id="transactionList"></tbody>
          </table>
          <p class="empty-state hidden" id="emptyState">No transactions to show.</p>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
